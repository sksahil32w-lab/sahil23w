<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>High Fidelity Game - Mobile Optimized</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; user-select: none; touch-action: none; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #crosshair { display: none; position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; z-index: 100; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(0, 210, 255, 0.9); box-shadow: 0 0 4px #00d2ff; }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; } 
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; } 
        
        /* Advanced Cinematic Loading Screen */
        #loading { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at center, #0f172a 0%, #000000 100%);
            color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 9999; backdrop-filter: blur(20px); transition: opacity 0.6s ease-in-out;
            pointer-events: auto;
        }
        #loading-text { font-size: 28px; font-weight: 800; margin-bottom: 25px; letter-spacing: 4px; color: #fff; text-shadow: 0 0 15px rgba(0, 212, 255, 0.8); }
        #loading-bar-bg { width: 400px; max-width: 80%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; margin-bottom: 40px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.8); }
        #loading-bar-fill { width: 0%; height: 100%; background: #00d2ff; transition: width 0.15s ease-out; box-shadow: 0 0 15px #00d2ff, 0 0 5px #fff; }
        #start-btn { 
            display: none; padding: 18px 50px; background: rgba(0, 212, 255, 0.1); color: #fff; 
            border: 1px solid rgba(0, 212, 255, 0.5); border-radius: 4px; font-weight: bold; font-size: 16px; 
            cursor: pointer; letter-spacing: 3px; transition: all 0.3s; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.2);
        }
        #start-btn:hover { background: rgba(0, 212, 255, 0.3); border-color: #00d2ff; box-shadow: 0 0 25px rgba(0, 212, 255, 0.4); transform: translateY(-2px); }
        
        #hud { position: absolute; bottom: 30px; left: 30px; color: rgba(255,255,255,0.9); font-size: 14px; background: rgba(0,0,0,0.5); padding: 15px 25px; border-radius: 8px; border-left: 4px solid #00d2ff; display: block; }
        
        #axis-fps-global { position: fixed; top: 10px; left: 10px; z-index: 9000; pointer-events: auto; width: 230px; background: rgba(6,10,15,0.7); border: 1px solid rgba(50, 50, 50, 0.8); padding: 8px; border-radius: 8px; color: #ddd; font-family: monospace; font-size: 12px; backdrop-filter: blur(6px); box-shadow: 0 6px 18px rgba(0,0,0,0.6); }
        #axis-fps-global label { margin-right: 8px; display: inline-flex; align-items: center; gap:6px; cursor: pointer; }
        #fps-counter { color: #00d2ff; font-weight:700; margin-left:6px; }
        #axis-fps-global .small { font-size:11px; color:#bbb; margin-top:6px; display:block; }
        
        .toggle-btn { background: #333; color: white; border: 1px solid #555; padding: 5px 10px; cursor: pointer; border-radius: 4px; margin-right: 5px; }
        .toggle-btn:hover { background: #555; }

        /* Hide the blue interact box completely across all platforms */
        #interact-hint { display: none !important; }

        /* --- MOBILE CONTROLS UI --- */
        #mobile-controls { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15; }
        .touch-btn { position: absolute; pointer-events: auto; background: rgba(0, 0, 0, 0.4); border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; backdrop-filter: blur(4px); text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
        .touch-btn:active, .touch-btn.active-toggle { background: rgba(0, 212, 255, 0.6); border-color: #00d2ff; }
        
        #joy-zone { position: absolute; bottom: 30px; left: 30px; width: 130px; height: 130px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15); pointer-events: auto; }
        #joy-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; border-radius: 50%; background: rgba(0, 212, 255, 0.5); transform: translate(-50%, -50%); pointer-events: none; box-shadow: 0 0 10px rgba(0,212,255,0.5); }
        
        #touch-look-zone { position: absolute; top: 0; right: 0; width: 50%; height: 100%; pointer-events: auto; }
        
        #btn-jump { bottom: 40px; right: 40px; width: 70px; height: 70px; font-size: 14px; }
        #btn-switch-char { bottom: 40px; right: 130px; width: 60px; height: 60px; font-size: 10px; text-align: center; line-height: 1.1; }
        #btn-sprint { bottom: 130px; right: 80px; width: 55px; height: 55px; font-size: 12px; }
        #btn-cam-swap { top: 20px; right: 20px; width: 50px; height: 50px; font-size: 12px; }
        
        /* Minimal Modern 'F' Button (Only shows near car) */
        #btn-interact { 
            display: none; bottom: 130px; right: 160px; width: 50px; height: 50px; 
            font-size: 20px; font-family: 'Segoe UI', sans-serif;
            background: rgba(10, 10, 10, 0.6); border: 1px solid rgba(255, 255, 255, 0.4); 
            color: white; text-align: center; line-height: 1; z-index: 20; 
            border-radius: 50%; backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4); text-shadow: none;
        }
        #btn-interact:active { background: rgba(255, 255, 255, 0.9); color: #000; border-color: #fff; }

        /* Mobile Horn Button */
        #btn-horn { 
            display: none; bottom: 200px; right: 160px; width: 50px; height: 50px; 
            font-size: 11px; font-family: 'Segoe UI', sans-serif;
            background: rgba(10, 10, 10, 0.6); border: 1px solid rgba(255, 255, 255, 0.4); 
            color: white; text-align: center; line-height: 1; z-index: 20; 
            border-radius: 50%; backdrop-filter: blur(5px);
        }
        #btn-horn:active, #btn-horn.active-toggle { background: rgba(255, 50, 50, 0.8); border-color: #ffaaaa; }

        /* CLEAN MOBILE VIEW: Keep Desktop same, hide UI elements on Mobile */
        @media (max-width: 900px) {
            #mobile-controls { display: block; }
            #hud { display: none !important; }
            #axis-fps-global { display: none !important; }
        }
    </style>
    
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="ui-layer">
        <div id="crosshair"></div>
        <div id="loading">
            <div id="loading-text">LOADING 0%</div>
            <div id="loading-bar-bg"><div id="loading-bar-fill"></div></div>
            <div id="start-btn">PLAY</div>
        </div>
        
        <!-- Elements kept in HTML so JavaScript bindings don't crash -->
        <div id="interact-hint"></div>
        <div id="hud">
            <b>WASD</b> Move/Drive | <b>SHIFT</b> Sprint | <b>SPACE</b> Jump/Brake | <b>C</b> Switch Char | <b>V</b> Change Camera | <b>F</b> Enter/Exit Car | <b>E</b> Horn
        </div>
    </div>

    <div id="mobile-controls">
        <div id="touch-look-zone"></div>
        <div id="joy-zone"><div id="joy-knob"></div></div>
        
        <div id="btn-jump" class="touch-btn">JUMP</div>
        <div id="btn-switch-char" class="touch-btn">SWITCH<br>CHAR</div>
        <div id="btn-sprint" class="touch-btn">SPRINT</div>
        <div id="btn-cam-swap" class="touch-btn">CAM</div>
        <div id="btn-interact" class="touch-btn">F</div>
        <div id="btn-horn" class="touch-btn">HORN</div>
    </div>

    <!-- PC Coordinate Shower / Debug UI (Hidden automatically on Mobile via CSS) -->
    <div id="axis-fps-global">
        <div style="display:flex; align-items:center; justify-content:space-between;">
            <div style="font-weight:700; color:#00d2ff">DEBUG</div>
            <div style="font-size:11px; color:#aaa">v9 Audio & Preload Update</div>
        </div>
        <div class="small">FPS: <span id="fps-counter">0</span></div>
        <div class="small" style="color: #ffaa00; margin-top: 6px;">POS: <span id="pos-display">0.00, 0.00, 0.00</span></div>
        <div style="margin-top:8px;">
            <label><input type="checkbox" id="axis-x"> <span style="color:#ff4444">X</span></label>
            <label><input type="checkbox" id="axis-y"> <span style="color:#44ff44">Y</span></label>
            <label><input type="checkbox" id="axis-z"> <span style="color:#4444ff">Z</span></label>
        </div>
        <div style="margin-top:8px; display:flex; gap:6px;">
            <button id="show-global-axis" class="toggle-btn" style="flex:1; padding:6px 8px;">Global</button>
        </div>
        <div style="margin-top:8px; display:flex; gap:6px;">
            <button id="perf-toggle" class="toggle-btn" style="flex:1; padding:6px 8px;">Perf Mode</button>
            <button id="shadow-toggle" class="toggle-btn" style="flex:1; padding:6px 8px;">Shadows</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { FXAAShader } from 'three/addons/shaders/FXAAShader.js';

        THREE.Cache.enabled = true;

        const isMobile = window.innerWidth <= 900 || /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);

        const CONFIG = {
            walkSpeed: 2.0, runSpeed: 6.5, gravity: -9.8 * 2.5, jumpForce: 8.0, 
            rotSpeed: 8.0, camSmoothness: 0.1
        };

        const CAR_CONFIG = {
            spawnPos: new THREE.Vector3(72, -53.93, -95), 
            scale: 30, 
            maxSpeed: 30.0,
            acceleration: 15.0,
            braking: 25.0,
            friction: 5.0,
            steerSpeed: 2.0,
            interactionDist: 4.0
        };

        const SEAT_POSITIONS = {
            driver: new THREE.Vector3(0.1, 0.7, 0.2),     
            passenger: new THREE.Vector3(-0.9, 0.7, 0.3)    
        };

        const CAR_CAMERA_MODES = [
            { name: "TPS_NEAR", dist: 5.0, height: 2.0 },
            { name: "TPS_MID",  dist: 8.0, height: 3.0 },
            { name: "TPS_FAR",  dist: 12.0, height: 4.5 }
        ];

        const SPAWN_POINTS = {
            player1: new THREE.Vector3(70, -53.93, -100.96),
            player2: new THREE.Vector3(75, -53.93, -100.96)
        };

        const CAMERA_MODES = [
            { name: "TPS_CLOSE", dist: 1.2, height: 1.5 },
            { name: "FPS",       dist: 0.0, height: 1.65 },
            { name: "TPS_MID",   dist: 2.2, height: 1.7 }, 
            { name: "TPS_FAR",   dist: 4.5, height: 2.2 }
        ];
        
        let currentCamIndex = 2;
        let currentCarCamIndex = 1; 

        let scene, camera, renderer, composer, clock;
        
        let characters = [];
        let activeCharIndex = 0;
        
        let carData = {
            mesh: null, mixer: null, driveAction: null, active: false, speed: 0, steerAngle: 0
        };

        let isSwitching = false;
        let switchTime = 0;
        const switchDuration = 3.0;
        let switchStartCamPos = new THREE.Vector3();
        let switchTargetCamPos = new THREE.Vector3();
        let switchStartLookAt = new THREE.Vector3();
        let switchTargetLookAt = new THREE.Vector3();
        let switchControlPoint = new THREE.Vector3();

        let isGameReady = false;

        let performanceMode = isMobile;
        let shadowsEnabled = !isMobile;
        let composerEnabled = !isMobile;
        let envMapTexture = null;
        let bloomPass = null, fxaaPass = null;
        let maxAnisotropy = 1;

        let collidableMeshList = []; 
        let terrainMeshList = []; 
        
        let downRay = new THREE.Raycaster();
        downRay.far = 4.0;
        let forwardRay = new THREE.Raycaster();
        forwardRay.far = 1.5; 
        let carRay = new THREE.Raycaster(); 
        carRay.far = 3.0; 

        const keys = { w: false, a: false, s: false, d: false, shift: false, space: false, q: false, e: false, f: false };
        const camState = { angleX: 0, angleY: Math.PI / 8, curDist: 3.0, curHeight: 1.9 };

        const joystick = { active: false, x: 0, y: 0, id: null };
        const touchLook = { id: null, lastX: 0, lastY: 0 };
        let mobileSprintToggle = false;

        let pmremGenerator = null;
        let listener;
        const sounds = {}; 
        
        let engineState = 'off'; 

        let axisGroup = null, axisX = null, axisY = null, axisZ = null;
        let showGlobalAxis = false;
        let fpsCounterEl = null, _frameCount = 0, _lastFpsTime = performance.now();

        const loadingManager = new THREE.LoadingManager();

        init();
        animate();

        function init() {
            setupLoadingManager();

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" }); 
            renderer.setPixelRatio(isMobile ? 1 : Math.min(window.devicePixelRatio || 1, 1.5));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = shadowsEnabled; 
            renderer.shadowMap.type = isMobile ? THREE.PCFShadowMap : THREE.PCFSoftShadowMap;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.body.appendChild(renderer.domElement);

            maxAnisotropy = Math.min(renderer.capabilities.getMaxAnisotropy(), isMobile ? 4 : 8);

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x8cb6d9);
            scene.fog = new THREE.FogExp2(0x8cb6d9, 0.0015);
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            scene.add(camera);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.85); 
            scene.add(ambientLight);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
            hemiLight.position.set(0, 50, 0);
            scene.add(hemiLight);

            const cameraFillLight = new THREE.PointLight(0xffffff, 0.6, 30);
            cameraFillLight.position.set(0, 0, 0); 
            camera.add(cameraFillLight);

            const sunLight = new THREE.DirectionalLight(0xfff5e6, 3.5);
            sunLight.position.set(100, 200, 100);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.set(isMobile ? 1024 : 2048, isMobile ? 1024 : 2048); 
            sunLight.shadow.camera.left = -250; sunLight.shadow.camera.right = 250;
            sunLight.shadow.camera.top = 250; sunLight.shadow.camera.bottom = -250;
            sunLight.shadow.camera.near = 0.5; sunLight.shadow.camera.far = 1000;
            sunLight.shadow.bias = -0.0005;
            scene.add(sunLight);

            pmremGenerator = new THREE.PMREMGenerator(renderer);
            pmremGenerator.compileEquirectangularShader();

            new RGBELoader(loadingManager).load('hdri.hdr', function(hdrTexture) {
                try {
                    envMapTexture = pmremGenerator.fromEquirectangular(hdrTexture).texture;
                    scene.environment = envMapTexture;
                    if (!performanceMode) scene.background = envMapTexture;
                } catch (e) {}
                hdrTexture.dispose();
            }, undefined, function(err) {});

            createAxisHelpers(5);

            const mapLoader = new GLTFLoader(loadingManager);
            mapLoader.load('map.glb', (gltf) => {
                const map = gltf.scene;
                map.name = "MyGameMap";
                map.position.set(-100, -60, 300);
                map.scale.set(100, 100, 100);

                map.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = shadowsEnabled;
                        child.receiveShadow = true;
                        
                        collidableMeshList.push(child);
                        terrainMeshList.push(child);

                        if (child.material) {
                            child.material.metalness = child.material.metalness !== undefined ? child.material.metalness : 0.1;
                            child.material.roughness = performanceMode ? 0.6 : (child.material.roughness || 0.4);
                            child.material.envMapIntensity = performanceMode ? 0.8 : 1.5; 
                            child.material.side = THREE.FrontSide;
                            
                            if(child.material.map) child.material.map.anisotropy = maxAnisotropy;
                            if(child.material.normalMap) child.material.normalMap.anisotropy = maxAnisotropy;

                            if(child.material.isMeshStandardMaterial) child.material.needsUpdate = true;
                        }
                    }
                });
                scene.add(map);
            });

            setupPostProcessing();
            setupAudio();
            setupInputs();
            loadAssets();

            fpsCounterEl = document.getElementById('fps-counter');
            bindAxisUI();

            applyPerformanceSettings(performanceMode);
        }

        function setupLoadingManager() {
            loadingManager.onProgress = function(url, itemsLoaded, itemsTotal) {
                const percent = Math.floor((itemsLoaded / itemsTotal) * 100);
                document.getElementById('loading-text').innerText = `LOADING ${percent}%`;
                document.getElementById('loading-bar-fill').style.width = `${percent}%`;
            };

            loadingManager.onLoad = function() {
                renderer.compile(scene, camera);

                document.getElementById('loading-text').innerText = "READY TO PLAY";
                document.getElementById('loading-bar-fill').style.width = `100%`;
                
                const startBtn = document.getElementById('start-btn');
                startBtn.style.display = 'block';
                
                startBtn.onclick = () => {
                    const overlay = document.getElementById('loading');
                    overlay.style.opacity = '0';
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        isGameReady = true;
                    }, 600);
                    
                    if (listener && listener.context && listener.context.state === 'suspended') {
                        listener.context.resume();
                    }
                };
            };
        }

        async function loadAssets() {
            const loader = new FBXLoader(loadingManager);
            const gltfLoader = new GLTFLoader(loadingManager);

            try {
                const [idleAnim, walkAnim, runAnim, jumpAnim, fallAnim, driverAnim, passengerAnim] = await Promise.all([
                    loader.loadAsync('idle.fbx').catch(() => null), 
                    loader.loadAsync('walk.fbx').catch(() => null),
                    loader.loadAsync('run.fbx').catch(() => null), 
                    loader.loadAsync('jump.fbx').catch(() => null),
                    loader.loadAsync('fall.fbx').catch(() => null),
                    loader.loadAsync('driver.fbx').catch(() => null),
                    loader.loadAsync('passenger.fbx').catch(() => null)
                ]);

                async function loadCharacterFile(file, name, spawnPosition) {
                    let charMesh;
                    try {
                        charMesh = await loader.loadAsync(file);
                    } catch(e) {
                        console.warn(`Could not load ${file}, using fallback.`);
                        charMesh = await loader.loadAsync('character.fbx');
                    }
                    
                    charMesh.name = name;
                    charMesh.position.copy(spawnPosition);

                    const box = new THREE.Box3().setFromObject(charMesh);
                    const size = box.getSize(new THREE.Vector3());
                    if (size.y > 0) charMesh.scale.setScalar(1.75 / size.y);

                    charMesh.traverse(obj => {
                        if (obj.isMesh) {
                            obj.castShadow = shadowsEnabled;
                            obj.receiveShadow = true;
                            if (obj.material) {
                                const processMat = (mat) => {
                                    if (mat.map) { mat.map.anisotropy = maxAnisotropy; mat.map.colorSpace = THREE.SRGBColorSpace; }
                                    if (mat.normalMap) mat.normalMap.anisotropy = maxAnisotropy;
                                    mat.envMapIntensity = 1.2;
                                    if(mat.shininess !== undefined) mat.shininess = Math.max(mat.shininess, 30);
                                    mat.needsUpdate = true;
                                };
                                if (Array.isArray(obj.material)) obj.material.forEach(processMat);
                                else processMat(obj.material);
                            }
                        }
                    });
                    scene.add(charMesh);

                    const charMixer = new THREE.AnimationMixer(charMesh);
                    
                    const charActions = {
                        'idle': idleAnim ? charMixer.clipAction(idleAnim.animations[0]) : null,
                        'walk': walkAnim ? charMixer.clipAction(walkAnim.animations[0]) : null,
                        'run': runAnim ? charMixer.clipAction(runAnim.animations[0]) : null,
                        'jump': jumpAnim ? charMixer.clipAction(jumpAnim.animations[0]) : null,
                        'fall': fallAnim ? charMixer.clipAction(fallAnim.animations[0]) : null,
                        'driver': (driverAnim && driverAnim.animations.length > 0) ? charMixer.clipAction(driverAnim.animations[0]) : (idleAnim ? charMixer.clipAction(idleAnim.animations[0]) : null),
                        'passenger': (passengerAnim && passengerAnim.animations.length > 0) ? charMixer.clipAction(passengerAnim.animations[0]) : (idleAnim ? charMixer.clipAction(idleAnim.animations[0]) : null)
                    };
                    
                    if (charActions['jump']) {
                        charActions['jump'].setLoop(THREE.LoopOnce);
                        charActions['jump'].clampWhenFinished = true;
                    }

                    const charData = {
                        mesh: charMesh, mixer: charMixer, actions: charActions, 
                        activeAction: charActions['idle'],
                        velocity: new THREE.Vector3(), onGround: false, isJumping: false, isFollowing: false,
                        inCar: false, 
                        spawnPoint: spawnPosition.clone() 
                    };

                    charMixer.addEventListener('finished', (e) => { if (e.action === charActions['jump']) charData.isJumping = false; });
                    if (charData.activeAction) charData.activeAction.play();
                    characters.push(charData);
                }

                await loadCharacterFile('character.fbx', 'Player1_Character', SPAWN_POINTS.player1);
                await loadCharacterFile('2ndcharacter.fbx', 'Player2_Character', SPAWN_POINTS.player2);

                try {
                    carData.mesh = await loader.loadAsync('car.fbx');
                } catch(e) {
                    try {
                        const carGltf = await gltfLoader.loadAsync('car.glb');
                        carData.mesh = carGltf.scene;
                    } catch(e2) {
                        console.warn("Could not load car.fbx or car.glb. Using Placeholder.");
                        const geo = new THREE.BoxGeometry(2, 1.2, 4.5);
                        const mat = new THREE.MeshStandardMaterial({color: 0xcc2222, roughness: 0.3, metalness: 0.8});
                        carData.mesh = new THREE.Mesh(geo, mat);
                    }
                }
                
                carData.mesh.scale.setScalar(CAR_CONFIG.scale);
                carData.mesh.position.copy(CAR_CONFIG.spawnPos);
                
                carData.mesh.traverse(c => {
                    if (c.isMesh) { 
                        c.castShadow = true; 
                        c.receiveShadow = true; 
                        collidableMeshList.push(c); 
                    }
                });
                scene.add(carData.mesh);

                carData.mixer = new THREE.AnimationMixer(carData.mesh);
                try {
                    const carAnimFile = await gltfLoader.loadAsync('caranimation.glb');
                    if (carAnimFile.animations.length > 0) {
                        carData.driveAction = carData.mixer.clipAction(carAnimFile.animations[0]);
                        carData.driveAction.play();
                        carData.driveAction.paused = true; 
                    }
                } catch (e) {
                    console.warn("No caranimation.glb found for the car's wheels.");
                }

            } catch (err) { console.error(err); }
        }

        function setupPostProcessing() {
            if (isMobile) return; 

            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            
            bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.80; bloomPass.strength = 0.25; bloomPass.radius = 0.5;
            composer.addPass(bloomPass);
            
            composer.addPass(new OutputPass());
            
            fxaaPass = new ShaderPass(FXAAShader);
            fxaaPass.material.uniforms['resolution'].value.x = 1 / window.innerWidth;
            fxaaPass.material.uniforms['resolution'].value.y = 1 / window.innerHeight;
            composer.addPass(fxaaPass);
        }

        function applyPerformanceSettings(enablePerf) {
            performanceMode = !!enablePerf;
            
            const pr = performanceMode ? 1 : Math.min(window.devicePixelRatio || 1, 1.5);
            renderer.setPixelRatio(pr);
            
            composerEnabled = !performanceMode; 
            
            if (performanceMode) {
                scene.background = new THREE.Color(0x8cb6d9);
            } else {
                if (envMapTexture) { scene.background = envMapTexture; }
            }

            const perfBtn = document.getElementById('perf-toggle');
            if (perfBtn) perfBtn.textContent = `Perf: ${performanceMode ? 'ON' : 'OFF'}`;
        }

        function toggleShadows() {
            shadowsEnabled = !shadowsEnabled;
            renderer.shadowMap.enabled = shadowsEnabled;
            
            scene.traverse((obj) => { 
                if (obj.isMesh) {
                    obj.castShadow = shadowsEnabled;
                    obj.receiveShadow = shadowsEnabled;
                    if(obj.material) obj.material.needsUpdate = true;
                } 
            });
            
            const shadowBtn = document.getElementById('shadow-toggle');
            if (shadowBtn) shadowBtn.textContent = `Shadows: ${shadowsEnabled ? 'ON' : 'OFF'}`;
        }

        function setupAudio() {
            listener = new THREE.AudioListener();
            camera.add(listener);
            const audioLoader = new THREE.AudioLoader(loadingManager);
            
            function loadSound(name, file, loop = false, volume = 1.0) {
                const sound = new THREE.Audio(listener);
                audioLoader.load(file, buffer => { 
                    sound.setBuffer(buffer); sound.setLoop(loop); sound.setVolume(volume); 
                    sounds[name] = sound; 
                }, undefined, () => {});
            }
            
            loadSound('walk', 'walk.mp3', true, 0.4);
            loadSound('run', 'run.mp3', true, 0.7);
            loadSound('jump', 'jump.mp3', false, 1.0);
            loadSound('land', 'land.mp3', false, 0.9);
            loadSound('switch', 'switch.mp3', false, 1.0); 
            
            loadSound('car_start', 'car_start.mp3', false, 1.0);
            loadSound('car_idle', 'car_idle.mp3', true, 0.0);
            loadSound('car_accelerate', 'car_accelerate.mp3', false, 0.0);
            loadSound('car_move', 'car_move.mp3', true, 0.0);
            loadSound('car_reverse', 'car_reverse.mp3', true, 0.0);
            loadSound('car_horn', 'car_horn.mp3', false, 1.0);
        }

        function createAxisHelpers(baseLength = 5) {
            axisGroup = new THREE.Group();
            const geomX = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(baseLength,0,0)]);
            axisX = new THREE.Line(geomX, new THREE.LineBasicMaterial({ color: 0xff4444 }));
            const geomY = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,baseLength,0)]);
            axisY = new THREE.Line(geomY, new THREE.LineBasicMaterial({ color: 0x44ff44 }));
            const geomZ = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,baseLength)]);
            axisZ = new THREE.Line(geomZ, new THREE.LineBasicMaterial({ color: 0x4444ff }));
            axisX.visible = axisY.visible = axisZ.visible = false;
            axisGroup.add(axisX); axisGroup.add(axisY); axisGroup.add(axisZ);
            axisGroup.visible = false;
            scene.add(axisGroup);
        }

        function setAxisVisibility(x, y, z) {
            if (!axisGroup) return;
            axisX.visible = !!x; axisY.visible = !!y; axisZ.visible = !!z;
            axisGroup.visible = (axisX.visible || axisY.visible || axisZ.visible) || showGlobalAxis;
        }

        function bindAxisUI() {
            const axX = document.getElementById('axis-x'), axY = document.getElementById('axis-y'), axZ = document.getElementById('axis-z');
            const globalBtn = document.getElementById('show-global-axis');
            
            axX.addEventListener('change', () => setAxisVisibility(axX.checked, axY.checked, axZ.checked));
            axY.addEventListener('change', () => setAxisVisibility(axX.checked, axY.checked, axZ.checked));
            axZ.addEventListener('change', () => setAxisVisibility(axX.checked, axY.checked, axZ.checked));

            globalBtn.addEventListener('click', () => {
                showGlobalAxis = !showGlobalAxis;
                globalBtn.textContent = showGlobalAxis ? 'Global On' : 'Global';
                axisGroup.visible = showGlobalAxis || axisX.visible || axisY.visible || axisZ.visible;
            });
            document.getElementById('perf-toggle').addEventListener('click', () => applyPerformanceSettings(!performanceMode));
            document.getElementById('shadow-toggle').addEventListener('click', () => toggleShadows());
            
            document.getElementById('shadow-toggle').textContent = `Shadows: ${shadowsEnabled ? 'ON' : 'OFF'}`;
        }

        function toggleCarInteraction() {
            if (!carData.mesh || isSwitching || characters.length === 0) return;
            
            const activeChar = characters[activeCharIndex];

            if (carData.active) {
                carData.active = false;
                
                if (carData.driveAction) carData.driveAction.paused = true;
                
                activeChar.inCar = false;
                activeChar.mesh.visible = true;
                const exitOffset = new THREE.Vector3(2.5, 0, 0).applyQuaternion(carData.mesh.quaternion);
                activeChar.mesh.position.copy(carData.mesh.position).add(exitOffset);
                activeChar.mesh.position.y += 1.0; 
                activeChar.mesh.rotation.set(0, carData.mesh.rotation.y, 0);
                
                characters.forEach((c, idx) => {
                    if (idx !== activeCharIndex && c.inCar) {
                        c.inCar = false;
                        c.mesh.visible = true;
                        const sideOffset = new THREE.Vector3(-2.5, 0, 0).applyQuaternion(carData.mesh.quaternion);
                        c.mesh.position.copy(carData.mesh.position).add(sideOffset);
                        c.mesh.position.y += 1.0;
                        c.mesh.rotation.set(0, carData.mesh.rotation.y, 0);
                    }
                });

                switchStartLookAt.copy(activeChar.mesh.position);

            } else {
                const dist = activeChar.mesh.position.distanceTo(carData.mesh.position);
                if (dist < CAR_CONFIG.interactionDist) {
                    carData.active = true;
                    activeChar.inCar = true;
                    activeChar.velocity.set(0,0,0);
                    
                    mobileSprintToggle = false;
                    keys.shift = false;
                    if (sounds.walk && sounds.walk.isPlaying) sounds.walk.stop();
                    if (sounds.run && sounds.run.isPlaying) sounds.run.stop();
                }
            }
        }

        function triggerCharacterSwitch() {
            if (isSwitching || characters.length <= 1) return;

            if (carData.active) {
                activeCharIndex = (activeCharIndex + 1) % characters.length;
                return;
            }

            isSwitching = true;
            switchTime = 0;
            
            if (sounds.switch) {
                if (sounds.switch.isPlaying) sounds.switch.stop();
                sounds.switch.play();
            }
            if (sounds.walk && sounds.walk.isPlaying) sounds.walk.stop();
            if (sounds.run && sounds.run.isPlaying) sounds.run.stop();

            switchStartCamPos.copy(camera.position);
            const sourceMesh = characters[activeCharIndex].mesh;
            switchStartLookAt.copy(sourceMesh.position);
            switchStartLookAt.y += (currentCamIndex === 1) ? 1.7 : 1.5;

            keys.w = keys.a = keys.s = keys.d = keys.shift = keys.space = false;
            joystick.active = false;
            mobileSprintToggle = false;

            activeCharIndex = (activeCharIndex + 1) % characters.length;
            const targetMesh = characters[activeCharIndex].mesh;

            const offsetX = Math.sin(camState.angleX) * camState.curDist * Math.cos(camState.angleY);
            const offsetZ = Math.cos(camState.angleX) * camState.curDist * Math.cos(camState.angleY);
            const offsetY = camState.curDist * Math.sin(camState.angleY);
            switchTargetCamPos.set(targetMesh.position.x + offsetX, targetMesh.position.y + camState.curHeight + offsetY, targetMesh.position.z + offsetZ);
            
            switchTargetLookAt.copy(targetMesh.position);
            switchTargetLookAt.y += (currentCamIndex === 1) ? 1.7 : 1.5;

            const dist = switchStartCamPos.distanceTo(switchTargetCamPos);
            switchControlPoint.copy(switchStartCamPos).lerp(switchTargetCamPos, 0.5);
            switchControlPoint.y = Math.max(switchStartCamPos.y, switchTargetCamPos.y) + Math.max(60, dist * 0.4); 
        }

        function setupInputs() {
            const unlockAudio = () => { if (listener && listener.context && listener.context.state === 'suspended') listener.context.resume(); };
            document.addEventListener('click', unlockAudio);
            document.addEventListener('touchstart', unlockAudio, {passive: true});

            document.addEventListener('keydown', e => {
                const map = { KeyW:'w', KeyA:'a', KeyS:'s', KeyD:'d', ShiftLeft:'shift', Space:'space', KeyQ:'q', KeyE:'e', KeyF:'f' };
                if (map[e.code] !== undefined) keys[map[e.code]] = true;
                
                if (e.code === 'KeyF') toggleCarInteraction();
                if (e.code === 'KeyC') triggerCharacterSwitch();
                
                if (e.code === 'KeyE') {
                    if (carData.active && sounds.car_horn && sounds.car_horn.buffer) {
                        if (sounds.car_horn.isPlaying) sounds.car_horn.stop();
                        sounds.car_horn.play();
                    }
                }
                
                if (e.code === 'KeyV') {
                    if (carData.active) {
                        currentCarCamIndex = (currentCarCamIndex + 1) % CAR_CAMERA_MODES.length;
                    } else {
                        currentCamIndex = (currentCamIndex + 1) % CAMERA_MODES.length;
                    }
                }
                if (e.code === 'KeyL') applyPerformanceSettings(!performanceMode); 
                if (e.code === 'KeyP') toggleShadows(); 
            });
            
            document.addEventListener('keyup', e => {
                const map = { KeyW:'w', KeyA:'a', KeyS:'s', KeyD:'d', ShiftLeft:'shift', Space:'space', KeyQ:'q', KeyE:'e', KeyF:'f' };
                if (map[e.code] !== undefined) keys[map[e.code]] = false;
            });

            document.addEventListener('mousemove', e => {
                if (document.pointerLockElement === document.body) {
                    if (isSwitching) return; 

                    const sensitivity = 0.002;
                    camState.angleX -= e.movementX * sensitivity;
                    camState.angleY -= e.movementY * sensitivity;
                    
                    camState.angleY = Math.max(0.05, Math.min(Math.PI / 2.2, camState.angleY));
                }
            });

            document.addEventListener('mousedown', (e) => {
                if(e.pointerType === "touch" || window.innerWidth <= 900) return; 
                document.body.requestPointerLock();
            });

            const lookZone = document.getElementById('touch-look-zone');
            lookZone.addEventListener('touchstart', e => {
                if(e.target.classList.contains('touch-btn') || isSwitching) return; 
                if (touchLook.id !== null) return;
                const t = e.changedTouches[0];
                touchLook.id = t.identifier;
                touchLook.lastX = t.clientX;
                touchLook.lastY = t.clientY;
            }, {passive: false});

            lookZone.addEventListener('touchmove', e => {
                if (isSwitching) return;
                for (let t of e.changedTouches) {
                    if (t.identifier === touchLook.id) {
                        const dx = t.clientX - touchLook.lastX;
                        const dy = t.clientY - touchLook.lastY;
                        const sensitivity = 0.005;
                        camState.angleX -= dx * sensitivity;
                        camState.angleY -= dy * sensitivity;
                        camState.angleY = Math.max(0.05, Math.min(Math.PI / 2.2, camState.angleY));
                        touchLook.lastX = t.clientX;
                        touchLook.lastY = t.clientY;
                    }
                }
            }, {passive: false});

            const endLook = e => { for (let t of e.changedTouches) { if (t.identifier === touchLook.id) touchLook.id = null; } };
            lookZone.addEventListener('touchend', endLook);
            lookZone.addEventListener('touchcancel', endLook);

            const joyZone = document.getElementById('joy-zone');
            const joyKnob = document.getElementById('joy-knob');
            let joyRect = joyZone.getBoundingClientRect();

            const updateJoy = (x, y) => {
                if(isSwitching) return;
                const cx = joyRect.left + joyRect.width / 2;
                const cy = joyRect.top + joyRect.height / 2;
                let dx = x - cx; let dy = y - cy;
                const maxR = joyRect.width / 2;
                const dist = Math.hypot(dx, dy);
                if (dist > maxR) { dx = (dx/dist)*maxR; dy = (dy/dist)*maxR; }
                joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                joystick.x = dx / maxR;
                joystick.y = dy / maxR;
            };

            joyZone.addEventListener('touchstart', e => {
                e.preventDefault();
                if(isSwitching) return;
                joyRect = joyZone.getBoundingClientRect();
                const t = e.changedTouches[0];
                joystick.id = t.identifier;
                joystick.active = true;
                updateJoy(t.clientX, t.clientY);
            }, {passive: false});

            joyZone.addEventListener('touchmove', e => {
                e.preventDefault();
                for (let t of e.changedTouches) {
                    if (t.identifier === joystick.id) updateJoy(t.clientX, t.clientY);
                }
            }, {passive: false});

            const endJoy = e => {
                for (let t of e.changedTouches) {
                    if (t.identifier === joystick.id) {
                        joystick.active = false; joystick.id = null; joystick.x = 0; joystick.y = 0;
                        joyKnob.style.transform = `translate(-50%, -50%)`;
                    }
                }
            };
            joyZone.addEventListener('touchend', endJoy);
            joyZone.addEventListener('touchcancel', endJoy);

            const btnJump = document.getElementById('btn-jump');
            btnJump.addEventListener('touchstart', e => { e.preventDefault(); if(!isSwitching) keys.space = true; btnJump.classList.add('active-toggle'); });
            btnJump.addEventListener('touchend', e => { e.preventDefault(); keys.space = false; btnJump.classList.remove('active-toggle'); });

            const btnSwitchChar = document.getElementById('btn-switch-char');
            btnSwitchChar.addEventListener('touchstart', e => { 
                e.preventDefault();
                triggerCharacterSwitch();
                btnSwitchChar.classList.add('active-toggle');
            });
            btnSwitchChar.addEventListener('touchend', e => { e.preventDefault(); btnSwitchChar.classList.remove('active-toggle'); });

            const btnSprint = document.getElementById('btn-sprint');
            btnSprint.addEventListener('touchstart', e => { 
                e.preventDefault(); 
                if(isSwitching) return;
                mobileSprintToggle = !mobileSprintToggle; 
                btnSprint.classList.toggle('active-toggle', mobileSprintToggle);
            });

            document.getElementById('btn-cam-swap').addEventListener('touchstart', e => {
                e.preventDefault();
                if (carData.active) {
                    currentCarCamIndex = (currentCarCamIndex + 1) % CAR_CAMERA_MODES.length;
                } else {
                    currentCamIndex = (currentCamIndex + 1) % CAMERA_MODES.length;
                }
            });

            const btnInteract = document.getElementById('btn-interact');
            btnInteract.addEventListener('touchstart', e => {
                e.preventDefault();
                toggleCarInteraction();
            });

            const btnHorn = document.getElementById('btn-horn');
            btnHorn.addEventListener('touchstart', e => {
                e.preventDefault();
                if (carData.active && sounds.car_horn && sounds.car_horn.buffer) {
                    if (sounds.car_horn.isPlaying) sounds.car_horn.stop();
                    sounds.car_horn.play();
                }
                btnHorn.classList.add('active-toggle');
            });
            btnHorn.addEventListener('touchend', e => {
                e.preventDefault();
                btnHorn.classList.remove('active-toggle');
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                if (composer) composer.setSize(window.innerWidth, window.innerHeight);
                if (fxaaPass) {
                    fxaaPass.material.uniforms['resolution'].value.x = 1 / window.innerWidth;
                    fxaaPass.material.uniforms['resolution'].value.y = 1 / window.innerHeight;
                }
                joyRect = joyZone.getBoundingClientRect();
            });
        }

        function fadeToAction(charData, name, duration) {
            if (!charData.actions || !charData.actions[name] || charData.activeAction === charData.actions[name]) return;
            const prev = charData.activeAction;
            charData.activeAction = charData.actions[name];
            if (prev) prev.fadeOut(duration);
            charData.activeAction.reset().fadeIn(duration).play();
        }

        // UPDATED: Dynamically toggle UI controls depending on whether inside or outside of car
        function checkCarProximity() {
            if (!carData.mesh || characters.length === 0 || isSwitching) return;
            
            const btnF = document.getElementById('btn-interact');
            const btnHorn = document.getElementById('btn-horn');
            const btnJump = document.getElementById('btn-jump');
            const btnSwitch = document.getElementById('btn-switch-char');
            const btnSprint = document.getElementById('btn-sprint');

            if (carData.active) {
                // INSIDE CAR
                btnF.innerHTML = "F";
                btnF.style.display = 'flex';
                btnHorn.style.display = 'flex'; 
                
                // Hide character movement controls
                btnJump.style.display = 'none';
                btnSwitch.style.display = 'none';
                btnSprint.style.display = 'none';
            } else {
                // OUTSIDE CAR
                const dist = characters[activeCharIndex].mesh.position.distanceTo(carData.mesh.position);
                
                // Show character movement controls
                btnJump.style.display = 'flex';
                btnSwitch.style.display = 'flex';
                btnSprint.style.display = 'flex';
                btnHorn.style.display = 'none'; 

                if (dist < CAR_CONFIG.interactionDist) {
                    btnF.innerHTML = "F";
                    btnF.style.display = 'flex';
                } else {
                    btnF.style.display = 'none';
                }
            }
        }

        function stopAllCarSounds() {
            ['car_start', 'car_idle', 'car_accelerate', 'car_move', 'car_reverse'].forEach(snd => {
                if (sounds[snd] && sounds[snd].isPlaying) sounds[snd].stop();
            });
        }

        function updateCarAudio(dt) {
            if (!carData.active) {
                if (engineState !== 'off') {
                    stopAllCarSounds();
                    engineState = 'off';
                }
                return;
            }

            const isForwardInput = keys.w || (joystick.active && joystick.y < -0.1);
            const isReverseInput = keys.s || (joystick.active && joystick.y > 0.1);

            if (engineState === 'off') {
                engineState = 'start';
                if (sounds.car_start && sounds.car_start.buffer) {
                    sounds.car_start.setVolume(1.0);
                    sounds.car_start.play();
                }
            } else if (engineState === 'start') {
                if (!sounds.car_start || !sounds.car_start.isPlaying || isForwardInput || isReverseInput) {
                    engineState = 'idle';
                }
            } else if (isForwardInput) {
                if (engineState === 'idle' || engineState === 'reverse') {
                    engineState = 'accel';
                    if (sounds.car_accelerate && sounds.car_accelerate.buffer) {
                        if (sounds.car_accelerate.isPlaying) sounds.car_accelerate.stop();
                        sounds.car_accelerate.setVolume(0); 
                        sounds.car_accelerate.play();
                    }
                } else if (engineState === 'accel') {
                    if (sounds.car_accelerate && !sounds.car_accelerate.isPlaying) {
                        engineState = 'move';
                    }
                }
            } else if (isReverseInput) {
                if (engineState !== 'reverse') {
                    engineState = 'reverse';
                }
            } else {
                if (engineState === 'move' || engineState === 'accel' || engineState === 'reverse') {
                    engineState = 'idle';
                }
            }

            const fadeSpeed = 3.5; 
            const targetVols = {
                car_idle: engineState === 'idle' ? 1.0 : 0.0,
                car_accelerate: engineState === 'accel' ? 1.0 : 0.0,
                car_move: engineState === 'move' ? 1.0 : 0.0,
                car_reverse: engineState === 'reverse' ? 1.0 : 0.0
            };

            for (let key in targetVols) {
                if (sounds[key] && sounds[key].buffer) {
                    let currentVol = sounds[key].getVolume();
                    let targetVol = targetVols[key];
                    
                    if (currentVol < targetVol) {
                        currentVol = Math.min(currentVol + fadeSpeed * dt, targetVol);
                        sounds[key].setVolume(currentVol);
                        if (!sounds[key].isPlaying && currentVol > 0) sounds[key].play();
                    } else if (currentVol > targetVol) {
                        currentVol = Math.max(currentVol - fadeSpeed * dt, targetVol);
                        sounds[key].setVolume(currentVol);
                        if (currentVol === 0 && sounds[key].isPlaying) sounds[key].stop();
                    }
                }
            }
        }

        function updatePhysics(dt) {
            if (characters.length === 0) return;

            if (carData.active && carData.mesh) {
                let throttle = 0;
                let steerInput = 0;

                if (keys.w) throttle += 1;
                if (keys.s) throttle -= 1;
                if (keys.a) steerInput += 1;
                if (keys.d) steerInput -= 1;

                if (joystick.active) {
                    throttle -= joystick.y; 
                    steerInput -= joystick.x; 
                }

                if (keys.space) {
                    carData.speed = THREE.MathUtils.lerp(carData.speed, 0, dt * CAR_CONFIG.braking);
                } else if (throttle !== 0) {
                    carData.speed += throttle * CAR_CONFIG.acceleration * dt;
                    carData.speed = THREE.MathUtils.clamp(carData.speed, -CAR_CONFIG.maxSpeed * 0.4, CAR_CONFIG.maxSpeed);
                } else {
                    carData.speed = THREE.MathUtils.lerp(carData.speed, 0, dt * CAR_CONFIG.friction);
                }

                if (Math.abs(carData.speed) < 0.1) carData.speed = 0;

                if (carData.mixer) {
                    carData.mixer.update(dt);
                    if (carData.driveAction) {
                        if (Math.abs(carData.speed) > 0.1) {
                            carData.driveAction.paused = false;
                            carData.driveAction.timeScale = carData.speed > 0 ? 1 : -1;
                        } else {
                            carData.driveAction.paused = true;
                        }
                    }
                }

                if (Math.abs(carData.speed) > 0) {
                    const direction = carData.speed > 0 ? 1 : -1;
                    const steerFactor = Math.min(Math.abs(carData.speed) / 10.0, 1.0); 
                    const steerAmount = steerInput * CAR_CONFIG.steerSpeed * dt * steerFactor * direction;
                    carData.mesh.rotation.y += steerAmount;
                }

                const moveDir = new THREE.Vector3(0, 0, 1).applyQuaternion(carData.mesh.quaternion);
                const collisionDir = moveDir.clone();
                if (carData.speed < 0) collisionDir.negate(); 

                let carBlocked = false;
                if (Math.abs(carData.speed) > 0.01) {
                    const carRayOrigin = carData.mesh.position.clone();
                    carRayOrigin.y += 1.0; 
                    
                    carRay.set(carRayOrigin, collisionDir);
                    const hits = carRay.intersectObjects(collidableMeshList, true);
                    
                    const validHit = hits.find(hit => {
                        let current = hit.object;
                        while(current) {
                            if (current === carData.mesh) return false;
                            current = current.parent;
                        }
                        return true;
                    });

                    if (validHit && validHit.distance < 2.5) {
                        carBlocked = true;
                    }
                }

                if (!carBlocked) {
                    carData.mesh.position.addScaledVector(moveDir, carData.speed * dt);
                } else {
                    carData.speed = 0; 
                }

                downRay.set(new THREE.Vector3(carData.mesh.position.x, carData.mesh.position.y + 2, carData.mesh.position.z), new THREE.Vector3(0, -1, 0));
                const hits = downRay.intersectObjects(terrainMeshList, true);
                if (hits.length > 0) {
                    carData.mesh.position.y = hits[0].point.y;
                }
            }
            
            for(let i = 0; i < characters.length; i++) {
                let charData = characters[i];
                let charMesh = charData.mesh;
                let isActive = (i === activeCharIndex);

                if (charData.inCar) {
                    const isDriver = (i === activeCharIndex);
                    
                    const localOffset = isDriver ? SEAT_POSITIONS.driver : SEAT_POSITIONS.passenger; 
                    const worldOffset = localOffset.clone().applyQuaternion(carData.mesh.quaternion);
                    
                    charMesh.position.copy(carData.mesh.position).add(worldOffset);
                    charMesh.quaternion.copy(carData.mesh.quaternion); 
                    
                    charData.velocity.set(0,0,0);
                    charMesh.visible = true; 
                    
                    if (isDriver) {
                        fadeToAction(charData, 'driver', 0.2);
                    } else {
                        fadeToAction(charData, 'passenger', 0.2);
                    }

                    continue; 
                }

                let isRunning = false;
                const forward = new THREE.Vector3(-Math.sin(camState.angleX), 0, -Math.cos(camState.angleX));
                const right = new THREE.Vector3(Math.cos(camState.angleX), 0, -Math.sin(camState.angleX));
                let moveDir = new THREE.Vector3(0,0,0);

                if (isActive && !isSwitching && !carData.active) {
                    isRunning = keys.shift || mobileSprintToggle;
                    if (keys.w) moveDir.add(forward); 
                    if (keys.s) moveDir.sub(forward);
                    if (keys.d) moveDir.add(right); 
                    if (keys.a) moveDir.sub(right);

                    if (joystick.active) {
                        moveDir.addScaledVector(forward, -joystick.y);
                        moveDir.addScaledVector(right, joystick.x);
                    }
                } else if (!isActive) {
                    let targetMesh = carData.active ? carData.mesh : characters[activeCharIndex].mesh;
                    let dist = charMesh.position.distanceTo(targetMesh.position);

                    if (carData.active) {
                        if (dist > 3.0) {
                            charData.isFollowing = true;
                        } else {
                            charData.isFollowing = false;
                            charData.inCar = true; 
                            continue;
                        }
                    } else {
                        if (dist > 3.5) charData.isFollowing = true;
                        if (dist < 2.0) charData.isFollowing = false;
                    }

                    if (charData.isFollowing) {
                        let dirToTarget = new THREE.Vector3().subVectors(targetMesh.position, charMesh.position);
                        dirToTarget.y = 0; 
                        dirToTarget.normalize();
                        moveDir.copy(dirToTarget);
                        isRunning = dist > 6.0; 
                    }
                }

                const speed = isRunning ? CONFIG.runSpeed : CONFIG.walkSpeed;
                const isMoving = moveDir.lengthSq() > 0.01;

                if (isActive && !isSwitching) {
                    if (charData.onGround && !charData.isJumping) {
                        if (isMoving) {
                            if (isRunning) {
                                if (sounds.walk && sounds.walk.isPlaying) sounds.walk.stop();
                                if (sounds.run && !sounds.run.isPlaying) sounds.run.play();
                            } else {
                                if (sounds.run && sounds.run.isPlaying) sounds.run.stop();
                                if (sounds.walk && !sounds.walk.isPlaying) sounds.walk.play();
                            }
                        } else {
                            if (sounds.walk && sounds.walk.isPlaying) sounds.walk.stop();
                            if (sounds.run && sounds.run.isPlaying) sounds.run.stop();
                        }
                    } else {
                        if (sounds.walk && sounds.walk.isPlaying) sounds.walk.stop();
                        if (sounds.run && sounds.run.isPlaying) sounds.run.stop();
                    }
                }

                let isBlocked = false;
                if (isMoving) {
                    const length = moveDir.length();
                    const normalizedDir = moveDir.clone().normalize();
                    
                    const rayOrigin = charMesh.position.clone(); rayOrigin.y += 1.0;
                    forwardRay.set(rayOrigin, normalizedDir);
                    const hits = forwardRay.intersectObjects(collidableMeshList, true);
                    if (hits.length > 0 && hits[0].distance < 0.5) isBlocked = true;
                    
                    if (!isBlocked) {
                        const appliedLength = (isActive && !isSwitching) ? Math.min(length, 1.0) : 1.0;
                        charMesh.position.addScaledVector(normalizedDir, speed * appliedLength * dt);
                        
                        const targetRot = Math.atan2(normalizedDir.x, normalizedDir.z);
                        let rotDiff = targetRot - charMesh.rotation.y;
                        while (rotDiff > Math.PI) rotDiff -= Math.PI * 2;
                        while (rotDiff < -Math.PI) rotDiff += Math.PI * 2;
                        charMesh.rotation.y += rotDiff * CONFIG.rotSpeed * dt;
                        
                        if (!charData.isJumping && charData.onGround) fadeToAction(charData, isRunning ? 'run' : 'walk', 0.2);
                    } else {
                        if (!charData.isJumping && charData.onGround) fadeToAction(charData, 'idle', 0.2);
                    }
                } else {
                    if (!charData.isJumping && charData.onGround) fadeToAction(charData, 'idle', 0.2);
                }

                if (isActive && !isSwitching && keys.space && charData.onGround && !charData.isJumping && !carData.active) {
                    charData.velocity.y = CONFIG.jumpForce; charData.onGround = false; charData.isJumping = true;
                    if (sounds.jump) { if (sounds.jump.isPlaying) sounds.jump.stop(); sounds.jump.play(); }
                    fadeToAction(charData, 'jump', 0.1);
                }

                if (!charData.onGround && charData.velocity.y < -3.0 && !charData.isJumping) {
                    fadeToAction(charData, 'fall', 0.2);
                }

                charData.velocity.y += CONFIG.gravity * dt;
                charMesh.position.y += charData.velocity.y * dt;

                const downOrigin = charMesh.position.clone(); downOrigin.y += 2.0;
                downRay.set(downOrigin, new THREE.Vector3(0, -1, 0));
                
                const intersects = downRay.intersectObjects(collidableMeshList, true);
                if (intersects.length > 0) {
                    const hit = intersects[0];
                    const groundHeight = hit.point.y;
                    const distToFloor = hit.distance;
                    if (distToFloor <= 2.2 && charData.velocity.y <= 0) {
                        if (isActive && !charData.onGround && sounds.land) { 
                            if (sounds.land.isPlaying) sounds.land.stop(); sounds.land.play(); 
                        }
                        charMesh.position.y = groundHeight;
                        charData.velocity.y = 0;
                        charData.onGround = true;
                    } else if (distToFloor > 2.2) {
                        charData.onGround = false;
                    }
                } else {
                    charData.onGround = false;
                    if (charMesh.position.y < -50) {
                        charMesh.position.copy(charData.spawnPoint);
                        charData.velocity.y = 0;
                    }
                }
            }
        }

        function updateGameCamera() {
            if (characters.length === 0) return;
            const activeMesh = characters[activeCharIndex].mesh;

            const target = CAMERA_MODES[currentCamIndex];
            camState.curDist = THREE.MathUtils.lerp(camState.curDist, target.dist, 0.1);
            camState.curHeight = THREE.MathUtils.lerp(camState.curHeight, target.height, 0.1);
            
            if (camState.curDist < 0.2) activeMesh.visible = false; else activeMesh.visible = true;

            const offsetX = Math.sin(camState.angleX) * camState.curDist * Math.cos(camState.angleY);
            const offsetZ = Math.cos(camState.angleX) * camState.curDist * Math.cos(camState.angleY);
            const offsetY = camState.curDist * Math.sin(camState.angleY);
            
            const targetPos = new THREE.Vector3(activeMesh.position.x + offsetX, activeMesh.position.y + camState.curHeight + offsetY, activeMesh.position.z + offsetZ);
            camera.position.copy(targetPos);
            
            const lookAtHeight = (currentCamIndex === 1) ? 1.7 : 1.5;
            camera.lookAt(activeMesh.position.x, activeMesh.position.y + lookAtHeight, activeMesh.position.z);
        }

        function updateCarCamera() {
            if (!carData.mesh) return;

            const target = CAR_CAMERA_MODES[currentCarCamIndex];
            
            camState.curDist = THREE.MathUtils.lerp(camState.curDist, target.dist, 0.1);
            camState.curHeight = THREE.MathUtils.lerp(camState.curHeight, target.height, 0.1);

            const offsetX = Math.sin(camState.angleX) * camState.curDist * Math.cos(camState.angleY);
            const offsetZ = Math.cos(camState.angleX) * camState.curDist * Math.cos(camState.angleY);
            const offsetY = camState.curDist * Math.sin(camState.angleY);

            const targetPos = new THREE.Vector3(
                carData.mesh.position.x + offsetX,
                carData.mesh.position.y + camState.curHeight + offsetY,
                carData.mesh.position.z + offsetZ
            );
            
            camera.position.lerp(targetPos, 0.2); 
            
            const lookTarget = new THREE.Vector3(
                carData.mesh.position.x,
                carData.mesh.position.y + 1.2, 
                carData.mesh.position.z
            );
            
            camera.lookAt(lookTarget);
        }

        function handleCinematicSwitchCamera(realDt) {
            switchTime += realDt;
            let t = Math.min(switchTime / switchDuration, 1.0);
            
            let easeT = t * t * (3 - 2 * t);

            const temp1 = new THREE.Vector3().copy(switchStartCamPos).lerp(switchControlPoint, easeT);
            const temp2 = new THREE.Vector3().copy(switchControlPoint).lerp(switchTargetCamPos, easeT);
            camera.position.copy(temp1).lerp(temp2, easeT);

            const currentLookAt = new THREE.Vector3().copy(switchStartLookAt).lerp(switchTargetLookAt, easeT);
            camera.lookAt(currentLookAt);

            camera.fov = 60 + Math.sin(easeT * Math.PI) * 35;
            camera.updateProjectionMatrix();

            if (t >= 1.0) {
                isSwitching = false;
                camera.fov = 60;
                camera.updateProjectionMatrix();
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isGameReady) return;
            
            const realDt = Math.min(clock.getDelta(), 0.1);
            
            const gameTimeScale = isSwitching ? 0.1 : 1.0;
            const scaledDt = realDt * gameTimeScale;
            
            characters.forEach(c => c.mixer.update(scaledDt));
            updatePhysics(scaledDt); 
            updateCarAudio(scaledDt); 
            checkCarProximity(); 

            if (isSwitching) {
                handleCinematicSwitchCamera(realDt);
            } else if (carData.active) {
                updateCarCamera(); 
            } else {
                updateGameCamera(); 
            }

            if (characters.length > 0) {
                const pos = characters[activeCharIndex].mesh.position;
                if(document.getElementById('pos-display')) {
                    document.getElementById('pos-display').textContent = `${pos.x.toFixed(2)}, ${pos.y.toFixed(2)}, ${pos.z.toFixed(2)}`;
                }
            }

            updateFps();

            if (axisGroup) {
                axisGroup.visible = showGlobalAxis;
            }

            if (composer && composerEnabled && !performanceMode && !isMobile) composer.render();
            else renderer.render(scene, camera);
        }

        function updateFps() {
            _frameCount++;
            const now = performance.now();
            const elapsed = (now - _lastFpsTime) / 1000;
            if (elapsed >= 0.5) {
                if (fpsCounterEl) fpsCounterEl.textContent = Math.round((_frameCount / elapsed));
                _frameCount = 0; _lastFpsTime = now;
            }
        }
    </script>
</body>
